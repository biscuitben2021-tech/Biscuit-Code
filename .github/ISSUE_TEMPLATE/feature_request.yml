name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Biscuit Browser (Electron app)
        - Biscuits CLI (Rust)
        - Docs / project
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      description: Biscuit Browser is a safety-focused agent browser.
      options:
        - label: This change does not weaken a trust boundary (gate, contract, key handling, page isolation) — or if it does, I've called that out above.
