name: Bug report
description: Report a problem so we can fix it
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! For anything that looks like a
        **security vulnerability**, please use private reporting instead — see
        [SECURITY.md](https://github.com/biscuitben2021-tech/Biscuit-Code/blob/main/biscuit-browser/SECURITY.md).
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Biscuit Browser (Electron app)
        - Biscuits CLI (Rust)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
      placeholder: When I ... the agent ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Set permission mode to ...
        3. Ask the agent to ...
        4. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "0.1.0 or git SHA"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Model provider / model
      placeholder: "OpenAI gpt-4o-mini / LM Studio / Anthropic ..."
  - type: textarea
    id: logs
    attributes:
      label: Action Log / console output
      description: Paste relevant entries from the Action Log panel or the dev console. Redact secrets.
      render: text
