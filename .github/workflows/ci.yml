name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Release build
        run: cargo build --release --locked

      - name: Smoke binaries
        if: runner.os != 'Windows'
        run: |
          ./target/release/biscuits --help
          ./target/release/biscuit --help
          ./target/release/biscuits eval --smoke

      - name: Smoke binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          .\target\release\biscuits.exe --help
          .\target\release\biscuit.exe --help
          .\target\release\biscuits.exe eval --smoke

  biscuit-browser:
    name: biscuit-browser (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        working-directory: biscuit-browser
    env:
      # We only typecheck / unit-test / bundle here — none of which launch
      # Electron — so skip the (large) Chromium binary download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: biscuit-browser/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check (main + preload + renderer, strict)
        run: npm run typecheck

      - name: Unit tests (safety layer)
        run: npm test

      - name: Build (electron-vite bundle)
        run: npm run build
